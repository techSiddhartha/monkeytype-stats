name: Update Monkeytype Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get Monkeytype Stats
        run: |
          curl \
            -H "Authorization: ApeKey ${{ secrets.MONKEYTYPE_APE_KEY }}" \
            https://api.monkeytype.com/users/stats \
            > stats.json

      - name: Update README
        run: |
          echo "# Monkeytype Stats" > README.md
          echo "" >> README.md
          echo "Last updated: $(date -u)" >> README.md
          echo "" >> README.md
          echo '```json' >> README.md
          cat stats.json >> README.md
          echo '```' >> README.md

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md stats.json

          git commit -m "Update Monkeytype stats" || exit 0
          git push